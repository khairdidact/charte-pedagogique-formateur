const state = {
  currentChapter: 0,
  currentPage: 0,
  scores: {},       // assessmentId -> score
  viewed: {},       // pageId -> true
  quizAnswers: {},  // pageId -> { answers: {qIdx: value}, submitted: bool }
  onCover: true
};

// Unlock rules based on ePoc data
function isChapterUnlocked(idx) {
  if (idx === 0) return true;
  if (idx === 1) return state.viewed['gu0aoq'] === true;
  if (idx === 2) return (state.scores['cv6axu'] || 0) >= 7;
  if (idx === 3) return (state.scores['th32eb'] || 0) >= 8;
  if (idx === 4) return (state.scores['v8eic5'] || 0) >= 5;
  if (idx === 5) return (state.scores['fx3ujw'] || 0) >= 16;
  return false;
}

function totalPages() {
  return CHAPTERS.reduce((a, c) => a + c.pages.length, 0);
}

function getPageGlobal() {
  let n = 0;
  for (let i = 0; i < state.currentChapter; i++) n += CHAPTERS[i].pages.length;
  return n + state.currentPage;
}

function updateProgress() {
  const pct = Math.round((getPageGlobal() / totalPages()) * 100);
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + ' %';
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  CHAPTERS.forEach((ch, idx) => {
    const locked = !isChapterUnlocked(idx);
    const active = !state.onCover && state.currentChapter === idx;
    const div = document.createElement('div');
    div.className = 'chapter-item' + (active ? ' active' : '') + (locked ? ' locked' : '');
    div.innerHTML = `
      <div class="chapter-num">Chapitre ${idx+1}</div>
      <div class="chapter-name">${ch.title}</div>
      <div class="chapter-icon">${locked ? '🔒 Déverrouillage requis' : (active ? '▶ En cours' : '')}</div>
    `;
    if (!locked) {
      div.onclick = () => navigateToChapter(idx);
    }
    nav.appendChild(div);
  });
}

function navigateToChapter(idx) {
  state.currentChapter = idx;
  state.currentPage = 0;
  state.onCover = false;
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('pageContent').classList.remove('hidden');
  renderPage();
  buildSidebar();
  updateProgress();
  window.scrollTo(0, 0);
}

function renderCover() {
  state.onCover = true;
  document.getElementById('cover').classList.remove('hidden');
  document.getElementById('pageContent').classList.add('hidden');
  buildSidebar();
  updateProgress();

  const cover = document.getElementById('cover');
  cover.innerHTML = `
    <div class="cover-badge">Module KHAIRDIDACT · E-W346X</div>
    <h1 class="cover-title">CHARTE PÉDAGOGIQUE DU FORMATEUR</h1>
    <div class="cover-subtitle">Fondation de l'Armée du Salut</div>
    <div class="cover-divider"></div>
    <div class="cover-meta">
      <div class="cover-tag">📚 6 chapitres</div>
      <div class="cover-tag">⏱ 45 minutes</div>
      <div class="cover-tag">🏆 Certificat inclus</div>
      <div class="cover-tag">🌐 Français</div>
    </div>
    <div class="cover-objectives">
      <h3>Objectifs de la formation</h3>
      ${['Comprendre son rôle de formateur bénévole de français au sein de la Fondation de l'Armée du Salut','Identifier les besoins des publics accueillis','Adopter la posture pédagogique attendue'].map((o,i) => `
        <div class="obj-item">
          <div class="obj-bullet">${i+1}</div>
          <span>${o}</span>
        </div>`).join('')}
    </div>
    <button class="btn-start" onclick="navigateToChapter(0)">▶&nbsp; Commencer la formation</button>
  `;
}

function renderPage() {
  const ch = CHAPTERS[state.currentChapter];
  const page = ch.pages[state.currentPage];
  state.viewed[page.id] = true;

  const container = document.getElementById('pageContent');
  let html = `
    <div class="page-header">
      <div class="chapter-breadcrumb">Chapitre ${state.currentChapter+1} — ${ch.title}</div>
      <h1 class="page-title">${page.title}</h1>
      ${page.subtitle ? `<div class="page-subtitle">${page.subtitle}</div>` : ''}
    </div>
  `;

  if (page.type === 'html') {
    html += `<div class="content-card">${page.html}</div>`;
  } else if (page.type === 'video') {
    html += `
      <div class="content-card">
        <div class="video-placeholder">
          <div class="video-icon">▶</div>
          <div class="video-label">${page.subtitle || 'Vidéo pédagogique'}</div>
        </div>
        <p style="font-size:13px;color:var(--text-soft);text-align:center;margin-bottom:16px;">
          <em>Vidéo disponible via le lecteur ePoc natif : <code>${page.source}</code></em>
        </p>
        <div>${page.summary}</div>
      </div>`;
  } else if (page.type === 'assessment') {
    html += renderAssessment(ch, page);
  }

  html += renderNavButtons();
  container.innerHTML = html;
  window.scrollTo(0, 0);
}

function renderAssessment(ch, page) {
  const qs = page.questions;
  const qState = state.quizAnswers[page.id] || { answers: {}, submitted: false };

  if (qState.submitted && qState.showResults) {
    return renderResults(page, qState);
  }

  let html = `
    <div class="quiz-header">
      <h2>${page.title} — ${page.subtitle || 'Évaluation'}</h2>
      <p>${page.summary || 'Répondez à toutes les questions.'}</p>
    </div>
  `;

  // Progress
  const answered = Object.keys(qState.answers).length;
  html += `
    <div class="quiz-progress">
      <span>${answered}/${qs.length} répondues</span>
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" style="width:${Math.round(answered/qs.length*100)}%"></div>
      </div>
    </div>
  `;

  qs.forEach((q, idx) => {
    const answered = qState.answers[idx] !== undefined;
    html += `<div class="question-card" id="q_${page.id}_${idx}">
      <div class="q-number">Question ${idx+1} / ${qs.length}</div>
      <div class="q-label">${q.label}</div>`;

    if (q.type === 'choice') {
      html += `<div class="choice-btns">`;
      q.responses.forEach(r => {
        const sel = qState.answers[idx] === r.value;
        let cls = '';
        if (qState.submitted && sel) {
          cls = q.correct.includes(r.value) ? 'correct' : 'wrong';
        }
        html += `<button class="choice-btn ${cls}"
          onclick="answerChoice('${page.id}',${idx},'${r.value}',event)"
          ${qState.submitted ? 'disabled' : ''}>${r.label}</button>`;
      });
      html += `</div>`;
      if (qState.submitted && qState.answers[idx] !== undefined) {
        const resp = q.responses.find(r => r.value === qState.answers[idx]);
        const correct = q.correct.includes(qState.answers[idx]);
        if (resp && resp.feedback) {
          html += `<div class="feedback-box show ${correct?'correct':'wrong'}">${resp.feedback}</div>`;
        }
      }

    } else if (q.type === 'swipe') {
      html += `<div class="swipe-btns">`;
      const opts = q.options || [];
      opts.forEach(opt => {
        const sel = qState.answers[idx] === opt.label;
        const isCorrect = opt.values && opt.values.length > 0;
        let cls = '';
        if (qState.submitted && sel) {
          cls = isCorrect ? 'correct' : 'wrong';
        }
        const valueTag = q.responses && q.responses[0] ? q.responses[0].label : '';
        html += `<button class="swipe-btn ${cls}"
          onclick="answerSwipe('${page.id}',${idx},'${opt.label.replace(/'/g,"&#39;")}',event)"
          ${qState.submitted ? 'disabled' : ''}>
          ${valueTag && isCorrect && qState.submitted ? `<span class="value-tag">${valueTag}</span>` : ''}
          ${opt.label}</button>`;
      });
      html += `</div>`;
      if (qState.submitted && qState.answers[idx] !== undefined) {
        const resp = q.responses && q.responses[0];
        const sel = qState.answers[idx];
        const selOpt = opts.find(o => o.label === sel);
        const correct = selOpt && selOpt.values && selOpt.values.length > 0;
        if (resp && resp.feedback) {
          html += `<div class="feedback-box show ${correct?'correct':'wrong'}">${resp.feedback}</div>`;
        }
      }

    } else if (q.type === 'dropdown-list') {
      if (q.context) {
        html += `<div class="q-context">${q.context}</div>`;
      }
      const selVal = qState.answers[idx] || '';
      let cls = '';
      if (qState.submitted && selVal) {
        cls = selVal === q.correct ? 'correct' : 'wrong';
      }
      html += `<select class="dropdown-select ${cls}"
        onchange="answerDropdown('${page.id}',${idx},this.value)"
        ${qState.submitted ? 'disabled' : ''}>
        <option value="">— Choisissez une réponse —</option>
        ${q.options.map(o => `<option value="${o.replace(/"/g,'&quot;')}" ${selVal===o?'selected':''}>${o}</option>`).join('')}
      </select>`;
      if (qState.submitted && selVal) {
        const correct = selVal === q.correct;
        if (q.feedback) {
          html += `<div class="feedback-box show ${correct?'correct':'wrong'}">${q.feedback}</div>`;
        }
      }

    } else if (q.type === 'drag-and-drop') {
      html += `<div class="dnd-item">${q.item}</div>`;
      html += `<div class="dnd-zones">`;
      q.options.forEach(opt => {
        const sel = qState.answers[idx] === opt;
        const isCorrect = opt === q.correct;
        let cls = '';
        if (qState.submitted && sel) cls = isCorrect ? 'correct' : 'wrong';
        else if (sel) cls = 'selected';
        html += `<div class="dnd-zone ${cls} ${qState.submitted?'disabled-zone':''}"
          onclick="${qState.submitted?'':'answerDnd(''+page.id+'','+idx+',''+opt.replace(/'/g,"&#39;")+'')'}">
          ${opt}
        </div>`;
      });
      html += `</div>`;
      if (qState.submitted && qState.answers[idx] !== undefined) {
        const sel = qState.answers[idx];
        const correct = sel === q.correct;
        if (q.feedback) {
          html += `<div class="feedback-box show ${correct?'correct':'wrong'}">${q.feedback}</div>`;
        }
      }
    }

    html += `</div>`; // end question-card
  });

  if (!qState.submitted) {
    html += `<button class="btn-validate"
      onclick="submitQuiz('${page.id}')"
      id="btn-submit-${page.id}">
      Valider mes réponses
    </button>`;
  }

  return html;
}

function renderResults(page, qState) {
  const qs = page.questions;
  let score = 0;
  qs.forEach((q, idx) => {
    const ans = qState.answers[idx];
    if (!ans) return;
    if (q.type === 'choice' && q.correct.includes(ans)) score++;
    else if (q.type === 'swipe') {
      const selOpt = (q.options||[]).find(o => o.label === ans);
      if (selOpt && selOpt.values && selOpt.values.length > 0) score++;
    }
    else if (q.type === 'dropdown-list' && ans === q.correct) score++;
    else if (q.type === 'drag-and-drop' && ans === q.correct) score++;
  });
  state.scores[page.id] = score;
  const pass = score >= page.passing_score;
  const pct = Math.round(score / qs.length * 100);

  let html = `
    <div class="quiz-results content-card">
      <div class="results-score">${score}/${qs.length}</div>
      <div class="results-label">soit ${pct}% de réponses correctes</div>
      <div class="results-status ${pass?'pass':'fail'}">
        ${pass ? '✓ Objectif atteint' : '✗ Score insuffisant'}
        ${page.passing_score > 0 ? ` (minimum requis : ${page.passing_score})` : ''}
      </div>
      ${!pass ? `<p style="font-size:14px;color:var(--text-soft);margin-bottom:16px;">Reprenez l'évaluation pour débloquer la suite.</p>
      <button class="btn-validate" onclick="retryQuiz('${page.id}')">↩ Recommencer</button>` : ''}
    </div>
  `;
  return html;
}

function renderNavButtons() {
  const ch = CHAPTERS[state.currentChapter];
  const isFirst = state.currentChapter === 0 && state.currentPage === 0;
  const isLast = state.currentChapter === CHAPTERS.length-1 && state.currentPage === ch.pages.length-1;
  const page = ch.pages[state.currentPage];
  const isQuiz = page.type === 'assessment';
  const qState = state.quizAnswers[page.id];
  const quizComplete = isQuiz && qState && qState.submitted && qState.showResults;
  const quizPassed = quizComplete && (state.scores[page.id] || 0) >= page.passing_score;

  let nextDisabled = false;
  if (isQuiz && (!quizComplete || !quizPassed)) nextDisabled = true;

  return `
    <div class="nav-buttons">
      <button class="btn btn-secondary"
        onclick="prevPage()" ${isFirst ? 'disabled' : ''}>
        ← Précédent
      </button>
      ${!isLast ? `<button class="btn btn-primary"
        onclick="nextPage()" ${nextDisabled ? 'disabled' : ''}>
        Suivant →
      </button>` : `<button class="btn btn-primary" onclick="showCertificate()">
        🏆 Terminer
      </button>`}
    </div>
  `;
}

function nextPage() {
  const ch = CHAPTERS[state.currentChapter];
  if (state.currentPage < ch.pages.length - 1) {
    state.currentPage++;
  } else if (state.currentChapter < CHAPTERS.length - 1) {
    state.currentChapter++;
    state.currentPage = 0;
  }
  renderPage();
  buildSidebar();
  updateProgress();
  window.scrollTo(0, 0);
}

function prevPage() {
  if (state.currentPage > 0) {
    state.currentPage--;
  } else if (state.currentChapter > 0) {
    state.currentChapter--;
    state.currentPage = CHAPTERS[state.currentChapter].pages.length - 1;
  }
  renderPage();
  buildSidebar();
  updateProgress();
  window.scrollTo(0, 0);
}

function answerChoice(pageId, idx, value, e) {
  if (!state.quizAnswers[pageId]) state.quizAnswers[pageId] = { answers: {}, submitted: false };
  state.quizAnswers[pageId].answers[idx] = value;
  renderPage();
}

function answerSwipe(pageId, idx, label, e) {
  if (!state.quizAnswers[pageId]) state.quizAnswers[pageId] = { answers: {}, submitted: false };
  state.quizAnswers[pageId].answers[idx] = label;
  renderPage();
}

function answerDropdown(pageId, idx, value) {
  if (!state.quizAnswers[pageId]) state.quizAnswers[pageId] = { answers: {}, submitted: false };
  state.quizAnswers[pageId].answers[idx] = value;
}

function answerDnd(pageId, idx, opt) {
  if (!state.quizAnswers[pageId]) state.quizAnswers[pageId] = { answers: {}, submitted: false };
  state.quizAnswers[pageId].answers[idx] = opt;
  renderPage();
}

function submitQuiz(pageId) {
  if (!state.quizAnswers[pageId]) state.quizAnswers[pageId] = { answers: {}, submitted: false };
  const qState = state.quizAnswers[pageId];
  const ch = CHAPTERS[state.currentChapter];
  const page = ch.pages[state.currentPage];

  // Calculate score
  let score = 0;
  page.questions.forEach((q, idx) => {
    const ans = qState.answers[idx];
    if (!ans) return;
    if (q.type === 'choice' && q.correct.includes(ans)) score++;
    else if (q.type === 'swipe') {
      const selOpt = (q.options||[]).find(o => o.label === ans);
      if (selOpt && selOpt.values && selOpt.values.length > 0) score++;
    }
    else if (q.type === 'dropdown-list' && ans === q.correct) score++;
    else if (q.type === 'drag-and-drop' && ans === q.correct) score++;
  });

  qState.submitted = true;
  qState.score = score;
  state.scores[pageId] = score;

  // Show per-question feedback, then after a moment show results
  renderPage();
  buildSidebar();

  // After 1.5s, show results screen
  setTimeout(() => {
    qState.showResults = true;
    renderPage();
    buildSidebar();
    updateProgress();
  }, 1500);
}

function retryQuiz(pageId) {
  state.quizAnswers[pageId] = { answers: {}, submitted: false };
  state.scores[pageId] = 0;
  renderPage();
}

function showCertificate() {
  const container = document.getElementById('pageContent');
  const totalScore = Object.values(state.scores).reduce((a,b) => a+b, 0);
  container.innerHTML = `
    <div class="certificate">
      <div class="cert-medal">🏅</div>
      <div class="cert-title">Certificat de réussite</div>
      <div class="cert-subtitle">Charte Pédagogique du Formateur Bénévole</div>
      <div class="cert-line"></div>
      <div class="cert-name">Formation KHAIRDIDACT · E-W346X</div>
      <div class="cert-text">
        Vous avez complété la charte pédagogique du formateur bénévole.<br><br>
        Vous connaissez les valeurs qui guident votre mission, les publics que vous allez
        accompagner, les postures à adopter — et celles à éviter.<br><br>
        <strong style="color:var(--gold-light)">Le terrain vous attend. Vous êtes prêt(e).</strong>
      </div>
      <div class="score-ribbon">⭐ Score total : ${totalScore} points</div>
    </div>
    <div class="nav-buttons" style="padding-top:24px;border-top:1px solid var(--border);">
      <button class="btn btn-secondary" onclick="prevPage()">← Retour</button>
      <button class="btn btn-primary" onclick="renderCover()">🏠 Accueil</button>
    </div>
  `;
  window.scrollTo(0, 0);
}

// Init
renderCover();
</script>
</body>
